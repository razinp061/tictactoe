services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NAKAMA_DATABASE_ADDRESS=postgres://postgres:localdb@postgres:5432/nakama?sslmode=disable
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./data:/nakama/data
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up --database.address postgres://postgres:localdb@postgres:5432/nakama?sslmode=disable &&
        exec /nakama/nakama --name nakama1 --database.address postgres://postgres:localdb@postgres:5432/nakama?sslmode=disable --logger.level DEBUG --session.token_expiry_sec 7200

volumes:
  pgdata: